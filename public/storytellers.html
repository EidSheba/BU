<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storytellers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow-x: hidden;
  }

  #scroll-container {
    height: 500vh;
    position: relative;
  }

  #pin-target {
    position: sticky;
    top: 0;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .circles-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .circle-svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    /* offset so the SVG center is at viewport center */
  }

  @keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .circle-svg {
    animation: spin 35s linear infinite;
  }

  /* GSAP will override scale + opacity via inline style on a wrapper,
     but we still need translate(-50%,-50%) for centering.
     We'll wrap each SVG in a div that GSAP scales/fades,
     and the SVG itself gets the spin (which includes the translate). */

  .circle-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    /* GSAP controls scale + opacity on this element */
  }

  .circle-ring .circle-svg {
    /* override: translate handles centering relative to .circle-ring */
    animation: spinRing 35s linear infinite;
  }

  @keyframes spinRing {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* after section */
  #after-section {
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<div id="scroll-container">
  <div id="pin-target">
    <div class="circles-wrapper" id="circles-wrapper">

      <!-- Ring 1: outermost, radius 280 -->
      <div class="circle-ring" id="ring1" style="opacity:0.1;">
        <svg class="circle-svg" width="620" height="620" viewBox="-310 -310 620 620">
          <defs>
            <path id="cp1" d="M 0,0 m -280,0 a 280,280 0 1,1 560,0 a 280,280 0 1,1 -560,0"/>
          </defs>
          <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
                font-size="22" font-weight="700" fill="#d0d0d0"
                letter-spacing="6" text-transform="uppercase">
            <textPath href="#cp1">
              STORYTELLERS • STORYTELLERS • STORYTELLERS • STORYTELLERS • STORYTELLERS • STORYTELLERS •&nbsp;
            </textPath>
          </text>
        </svg>
      </div>

      <!-- Ring 2: radius 180 -->
      <div class="circle-ring" id="ring2" style="opacity:0;">
        <svg class="circle-svg" width="400" height="400" viewBox="-200 -200 400 400">
          <defs>
            <path id="cp2" d="M 0,0 m -180,0 a 180,180 0 1,1 360,0 a 180,180 0 1,1 -360,0"/>
          </defs>
          <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
                font-size="16" font-weight="700" fill="#d0d0d0"
                letter-spacing="4" text-transform="uppercase">
            <textPath href="#cp2">
              STORYTELLERS • STORYTELLERS • STORYTELLERS • STORYTELLERS •&nbsp;
            </textPath>
          </text>
        </svg>
      </div>

      <!-- Ring 3: radius 110 -->
      <div class="circle-ring" id="ring3" style="opacity:0;">
        <svg class="circle-svg" width="250" height="250" viewBox="-125 -125 250 250">
          <defs>
            <path id="cp3" d="M 0,0 m -110,0 a 110,110 0 1,1 220,0 a 110,110 0 1,1 -220,0"/>
          </defs>
          <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
                font-size="12" font-weight="700" fill="#d0d0d0"
                letter-spacing="3" text-transform="uppercase">
            <textPath href="#cp3">
              STORYTELLERS • STORYTELLERS • STORYTELLERS •&nbsp;
            </textPath>
          </text>
        </svg>
      </div>

      <!-- Ring 4: innermost, radius 60 -->
      <div class="circle-ring" id="ring4" style="opacity:0;">
        <svg class="circle-svg" width="150" height="150" viewBox="-75 -75 150 150">
          <defs>
            <path id="cp4" d="M 0,0 m -60,0 a 60,60 0 1,1 120,0 a 60,60 0 1,1 -120,0"/>
          </defs>
          <text font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
                font-size="8" font-weight="700" fill="#d0d0d0"
                letter-spacing="2" text-transform="uppercase">
            <textPath href="#cp4">
              STORYTELLERS • STORYTELLERS •&nbsp;
            </textPath>
          </text>
        </svg>
      </div>

    </div>
  </div>
</div>

<!-- content after the storytellers section -->
<div id="after-section"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);

  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: "#scroll-container",
      start: "top top",
      end: "bottom bottom",
      scrub: 0.5,
      pin: false, /* pinning is handled by CSS sticky */
    }
  });

  /* --- Ring 1: scale 0.1→1.6, opacity 0.1→1 over 0%→20% --- */
  tl.fromTo("#ring1",
    { scale: 0.1, opacity: 0.1 },
    { scale: 1.0, opacity: 1, ease: "power2.out", duration: 0.20 },
    0
  );

  /* scale up slightly more as inner rings appear */
  tl.to("#ring1", { scale: 1.15, ease: "none", duration: 0.80 }, 0.20);

  /* --- Ring 2: appears at 20% scroll, grows to full by 40% --- */
  tl.fromTo("#ring2",
    { scale: 0.05, opacity: 0 },
    { scale: 1.0,  opacity: 1, ease: "power2.out", duration: 0.20 },
    0.20
  );
  tl.to("#ring2", { scale: 1.1, ease: "none", duration: 0.60 }, 0.40);

  /* --- Ring 3: appears at 40% scroll, grows to full by 65% --- */
  tl.fromTo("#ring3",
    { scale: 0.05, opacity: 0 },
    { scale: 1.0,  opacity: 1, ease: "power2.out", duration: 0.25 },
    0.40
  );
  tl.to("#ring3", { scale: 1.1, ease: "none", duration: 0.45 }, 0.65);

  /* --- Ring 4: appears at 65% scroll, grows to full by 90% --- */
  tl.fromTo("#ring4",
    { scale: 0.05, opacity: 0 },
    { scale: 1.0,  opacity: 1, ease: "power2.out", duration: 0.25 },
    0.65
  );

  /* total timeline duration that maps to scroll 0→1 */
  /* GSAP normalises timeline positions by the total duration,
     so we set total duration = 1 to keep positions as fractions */
  tl.duration(1);
</script>
</body>
</html>
